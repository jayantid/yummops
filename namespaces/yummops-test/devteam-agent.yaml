apiVersion: apps/v1
kind: Deployment
metadata:
  name: devteam-agent-yummops-test
  namespace: yummops-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devteam-agent
  template:
    metadata:
      labels:
        app: devteam-agent
    spec:
      containers:
      - name: agent
        image: us-central1-docker.pkg.dev/jayantid-gke-dev/kube-agents/devteam-agent:latest
        env:
        - name: NAMESPACE
          value: yummops-test
        - name: CLUSTER_NAME
          value: demo-cluster-2
        - name: CLUSTER_LOCATION
          value: us-central1-a
        - name: GIT_REPO
          value: git@github.com:jayantid/yummops.git
