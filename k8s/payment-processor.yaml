apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-processor-sa
  annotations:
    iam.gke.io/gcp-service-account: payment-sa@my-project.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      serviceAccountName: payment-processor-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: payment-processor
        image: openjdk:11-jre-slim
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
