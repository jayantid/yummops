apiVersion: v1
kind: ServiceAccount
metadata:
  name: devteam-agent-sa
  namespace: yummops-test
---
apiVersion: v1
kind: Secret
metadata:
  name: devteam-agent-secrets
  namespace: yummops-test
type: Opaque
stringData:
  api-server-key: "demo-gateway-key-12345"
  github-token: "<REDACTED_PAT>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devteam-agent-config
  namespace: yummops-test
data:
  SETTINGS.md: |
    # GKE Scope Configuration
    - **Cluster Name:** unknown-cluster
    - **Cluster Location:** unknown-location
    - **Namespace:** yummops-test
    - **Git Repo:** git@github.com:jayantid/yummops.git
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devteam-agent-pvc
  namespace: yummops-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devteam-agent
  namespace: yummops-test
  labels:
    app: devteam-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devteam-agent
  template:
    metadata:
      labels:
        app: devteam-agent
    spec:
      serviceAccountName: devteam-agent-sa
      containers:
        - name: devteam-agent
          image: us-central1-docker.pkg.dev/jayantid-gke-dev/kube-agents/devteam-agent:latest
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "4Gi"
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: devteam-agent-secrets
                  key: api-server-key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: devteam-agent-secrets
                  key: github-token
            - name: MODEL_NAME
              value: "gemini-model"
            - name: MODEL_BASE_URL
              value: "http://litellm.agent-system.svc.cluster.local/v1"
            - name: MODEL_API_KEY
              value: "none"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/data
            - name: config-volume
              mountPath: /opt/data/SETTINGS.md
              subPath: SETTINGS.md
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: devteam-agent-pvc
        - name: config-volume
          configMap:
            name: devteam-agent-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devteam-agent-read-role
  namespace: yummops-test
rules:
  - apiGroups: ["", "apps"]
    resources: ["deployments", "services", "configmaps", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devteam-agent-read-role-binding
  namespace: yummops-test
subjects:
  - kind: ServiceAccount
    name: devteam-agent-sa
    namespace: yummops-test
roleRef:
  kind: Role
  name: devteam-agent-read-role
  apiGroup: rbac.authorization.k8s.io
